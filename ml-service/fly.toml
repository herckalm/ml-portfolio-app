app = 'ml-portfolio-ml'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  MC_ALIAS_NAME = 'r2'
  ARTIFACT_BUCKET = 'ml-artifacts'
  ARTIFACT_VERSION = '1.0.0'
  UVICORN_HOST = '::'

[mounts]
  source = 'ml_artifacts'
  destination = '/app/artifacts'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  