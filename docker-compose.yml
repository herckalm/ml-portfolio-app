services:
  postgres:
    image: postgres:16-alpine
    container_name: ml_portfolio_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432" # host-published for local DB GUIs; drop in prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # S3-compatible object store for local model-artifact delivery. Recent minio images bundle `mc` with a preconfigured `local` alias, so the healthcheck is `mc ready local` (the image dropped curl). Tag is pinned, not `latest`, per the artifact-delivery contract.
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ml_portfolio_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000" # S3 API — host-published for the console/mc; drop in prod
      - "9001:9001" # web console — dev convenience; drop in prod
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot seeder (manual, profile-gated). Mirrors the local DistilBERT export into the bucket ONCE and uploads a SHA256SUMS manifest computed over the four serving files. Only the files serving needs — model.safetensors is unused and unreadable by appuser, so it's deliberately NOT shipped. Run explicitly with: docker compose --profile seed run --rm minio-seed
  minio-seed:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles: ["seed"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET}
      ARTIFACT_VERSION: ${ARTIFACT_VERSION}
    volumes:
      - ${ARTIFACT_SOURCE_DIR:-/tmp}:/src:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$ARTIFACT_BUCKET"
        cd /src
        sha256sum model.onnx config.json tokenizer.json calibration.json > /tmp/SHA256SUMS
        DEST="local/$$ARTIFACT_BUCKET/nlp/distilbert-cfpb/$$ARTIFACT_VERSION/"
        mc cp model.onnx config.json tokenizer.json calibration.json /tmp/SHA256SUMS "$$DEST"
        echo "seeded $$DEST"
    restart: "no"

  # One-shot puller (runs on every `up`). Populates the shared artifact volume from the bucket, then verifies checksums. Tolerant by contract: if the versioned prefix is absent (nothing seeded), it logs and exits 0 so ml-service degrades to demo mode — "pull fails or is disabled -> demo 200".
  artifact-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET}
      ARTIFACT_VERSION: ${ARTIFACT_VERSION}
    volumes:
      - ml_artifacts:/artifacts
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        SRC="local/$$ARTIFACT_BUCKET/nlp/distilbert-cfpb/$$ARTIFACT_VERSION/"
        if mc stat "$${SRC}model.onnx" >/dev/null 2>&1; then
          mkdir -p /artifacts/nlp/distilbert-cfpb
          mc cp --recursive "$$SRC" /artifacts/nlp/distilbert-cfpb/
          cd /artifacts/nlp/distilbert-cfpb
          sha256sum -c SHA256SUMS
          echo "artifact pulled and verified"
        else
          echo "artifact prefix absent ($$SRC) — leaving demo mode"
        fi
    restart: "no"

  # One-shot: waits for a healthy DB, applies migrations, exits 0.
  migrator:
    build:
      context: ./backend
      target: migrator
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ml-portfolio-api
      Jwt__Audience: ml-portfolio-client
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no" # must NOT loop — it's meant to run once and exit

  backend:
    build:
      context: ./backend
      target: runtime # explicit, so it never accidentally builds 'migrator'
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ml-portfolio-api
      Jwt__Audience: ml-portfolio-client
      Jwt__ExpiryHours: "24"
      MlService__BaseUrl: "http://ml-service:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully # schema exists before API boots
    ports:
      - "5013:8080" # host 5013 → container 8080
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
    environment:
      POSTGRES_HOST: postgres # the four names your health.py reads
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ml_artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      artifact-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend # ordering only; nginx resolver makes it resilient
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      RESOLVER: 127.0.0.11
      BACKEND_UPSTREAM: http://backend:8080

volumes:
  postgres_data:
  minio_data:
  ml_artifacts:
