services:
  postgres:
    image: postgres:16-alpine
    container_name: ml_portfolio_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432" # host-published for local DB GUIs; drop in prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # S3-compatible object store for local model-artifact delivery. Recent minio
  # images bundle `mc` with a preconfigured `local` alias, so the healthcheck
  # is `mc ready local` (the image dropped curl). Tag is pinned, not `latest`,
  # per the artifact-delivery contract.
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ml_portfolio_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000" # S3 API — host-published for the console/mc; drop in prod
      - "9001:9001" # web console — dev convenience; drop in prod
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot seeder (manual, profile-gated). Seeds NLP and CV bundles into
  # the bucket with SHA256SUMS manifests for each model. Only serving files
  # are shipped — model.safetensors is deliberately NOT included.
  # Run explicitly with: docker compose --profile seed run --rm minio-seed
  minio-seed:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles: ["seed"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET}
      ARTIFACT_VERSION: ${ARTIFACT_VERSION}
    volumes:
      - ${NLP_ARTIFACT_SOURCE_DIR:-/tmp}:/src/nlp:ro
      - ${CV_ARTIFACT_SOURCE_DIR:-/tmp}:/src/cv:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$ARTIFACT_BUCKET"

        # --- NLP: distilbert-cfpb ---
        cd /src/nlp
        sha256sum model.onnx config.json tokenizer.json calibration.json > /tmp/SHA256SUMS
        NLP_DEST="local/$$ARTIFACT_BUCKET/nlp/distilbert-cfpb/$$ARTIFACT_VERSION/"
        mc cp model.onnx config.json tokenizer.json calibration.json /tmp/SHA256SUMS "$$NLP_DEST"
        echo "seeded $$NLP_DEST"

        # --- CV: vit-cifar10 ---
        cd /src/cv
        CV_DEST="local/$$ARTIFACT_BUCKET/cv/vit-cifar10/$$ARTIFACT_VERSION/"
        if [ -f vit_best.onnx.data ]; then
          sha256sum vit_best.onnx vit_best.onnx.data > /tmp/SHA256SUMS
          mc cp vit_best.onnx vit_best.onnx.data /tmp/SHA256SUMS "$$CV_DEST"
        else
          sha256sum vit_best.onnx > /tmp/SHA256SUMS
          mc cp vit_best.onnx /tmp/SHA256SUMS "$$CV_DEST"
        fi
        echo "seeded $$CV_DEST"
    restart: "no"

  # One-shot puller (runs on every `up`). Populates the shared artifact volume
  # from the bucket, then verifies checksums. Tolerant by contract: if a
  # versioned prefix is absent (nothing seeded), it logs and exits 0 so
  # ml-service degrades to demo mode.
  artifact-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET}
      ARTIFACT_VERSION: ${ARTIFACT_VERSION}
    volumes:
      - ml_artifacts:/artifacts
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"

        # --- NLP: distilbert-cfpb ---
        NLP_SRC="local/$$ARTIFACT_BUCKET/nlp/distilbert-cfpb/$$ARTIFACT_VERSION/"
        if mc stat "$${NLP_SRC}model.onnx" >/dev/null 2>&1; then
          mkdir -p /artifacts/nlp/distilbert-cfpb
          mc cp --recursive "$$NLP_SRC" /artifacts/nlp/distilbert-cfpb/
          cd /artifacts/nlp/distilbert-cfpb
          sha256sum -c SHA256SUMS
          echo "nlp artifact pulled and verified"
        else
          echo "nlp artifact prefix absent ($$NLP_SRC) — leaving demo mode"
        fi

        # --- CV: vit-cifar10 ---
        CV_SRC="local/$$ARTIFACT_BUCKET/cv/vit-cifar10/$$ARTIFACT_VERSION/"
        if mc stat "$${CV_SRC}vit_best.onnx" >/dev/null 2>&1; then
          mkdir -p /artifacts/cv/vit-cifar10
          mc cp --recursive "$$CV_SRC" /artifacts/cv/vit-cifar10/
          cd /artifacts/cv/vit-cifar10
          sha256sum -c SHA256SUMS
          echo "cv artifact pulled and verified"
        else
          echo "cv artifact prefix absent ($$CV_SRC) — leaving demo mode"
        fi
    restart: "no"

  # One-shot: waits for a healthy DB, applies migrations, exits 0.
  migrator:
    build:
      context: ./backend
      target: migrator
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ml-portfolio-api
      Jwt__Audience: ml-portfolio-client
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no" # must NOT loop — it's meant to run once and exit

  backend:
    build:
      context: ./backend
      target: runtime # explicit, so it never accidentally builds 'migrator'
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ml-portfolio-api
      Jwt__Audience: ml-portfolio-client
      Jwt__ExpiryHours: "24"
      MlService__BaseUrl: "http://ml-service:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully # schema exists before API boots
    ports:
      - "5013:8080" # host 5013 → container 8080
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
    volumes:
      - ml_artifacts:/app/artifacts
    depends_on:
      artifact-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend # ordering only; nginx resolver makes it resilient
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      RESOLVER: 127.0.0.11
      BACKEND_UPSTREAM: http://backend:8080

volumes:
  postgres_data:
  minio_data:
  ml_artifacts:
