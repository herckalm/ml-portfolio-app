name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-flight run when you push again to the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # 1) Figure out which service folders actually changed in this PR.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      ml-service: ${{ steps.filter.outputs.ml-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            ml-service:
              - 'ml-service/**'

  # 2) Frontend: install -> lint -> build (build already runs tsc -b).
  frontend:
    name: Frontend (lint + build)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build # tsc -b && vite build

  # 3) Backend: restore -> build. No test project yet (see notes below).
  backend:
    name: Backend (build)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release

  # 4) ml-service: sync (asserts lockfile) -> ruff lint. No tests yet.
  ml-service:
    name: ML service (lint)
    needs: changes
    if: ${{ needs.changes.outputs.ml-service == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uvx ruff check .

  # 5) Single aggregation gate.
  ci-success:
    name: CI success
    if: ${{ always() }}
    needs: [changes, frontend, backend, ml-service]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        run: |
          results="${{ needs.changes.result }} ${{ needs.frontend.result }} ${{ needs.backend.result }} ${{ needs.ml-service.result }}"
          echo "Job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A required job failed."
              exit 1
            fi
          done
          echo "All jobs passed or were correctly skipped."
