server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that isn't a real file falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend container over compose's network.
    # "backend" = the service name we'll define in docker-compose; 8080 = its
    # container port. This is what replaces the Vite dev proxy in production.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}